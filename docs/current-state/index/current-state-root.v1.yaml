    - if_intent: runtime path or execution lane is known
      read:
        - docs/current-state/index/runtime-topology.v1.yaml
        - docs/current-state/features/<feature_id>/feature-detail.v1.yaml
  canonical_working_unit: feature detail YAML
  canonical_reverse_lookup_unit: touchpoint index
  canonical_runtime_lookup_unit: runtime topology

