    naming_rule: <feature_id>/feature-detail.v1.yaml
  supporting_overviews: []

design_decisions:
  - decision: publish current-state docs before the first implementation artifact exists
    reason: Future onboarding should not need to infer whether the repository is still
      in bootstrap-only mode.
  - decision: keep a single bootstrap feature as the canonical working unit until
      functional code appears
    reason: The repository currently contains governance and spec-first entrypoints,
      not product code.
  - decision: treat Markdown as the canonical authoring surface and static HTML as
      the primary delivery surface
    reason: Searchability and cross-linking matter more than book-shaped output for
      the primary user problem.
  - decision: preserve separate authority classes for official ReVIEW docs, TECHZIP
      usage evidence, and VS Code diagnostics policy
    reason: The repository should explain upstream truth, not collapse distinct
      sources into an undocumented local rule set.

schema_keys_reference:
  feature_manifest_required_keys:
