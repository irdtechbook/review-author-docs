variant_policy:
  canonical_current_docs: docs/current-state/index + docs/current-state/features
  retained_supporting_docs: []
  generated_views:
    - .serena/onboarding.md

confidence_and_gaps:
  confidence: high
  evidence:
    - AGENTS.md
    - docs/repository-genesis/repository-init-manifest.v1.yaml
    - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
    - docs/current-state/features/author-docs-hub-foundation/feature-detail.v1.yaml
    - specs/README.md
    - specs/author-docs-hub-foundation/design.md
    - scripts/validate_current_state_docs.py
  open_questions:
    - Which search/index integration and derivative artifact toolchain should sit behind the planned Astro publication runtime?
    - Should the GitHub Pages publish workflow promote every main-branch build or release-tag builds only?
