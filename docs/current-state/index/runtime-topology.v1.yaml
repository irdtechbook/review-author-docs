metadata:
  document_id: review-author-docs-runtime-topology-v1
  version: 1
  status: active
  canonical_name: review-author-docs-runtime-topology
  purpose: >
    Runtime topology for constrained-index-first current-state docs.
  repository_root: C:/Users/tky99/dev/review-author-docs

runtimes:
  - runtime_id: repo-governance-docs
    kind: bootstrap-docs-plus-validator
    status: active
    files:
      - AGENTS.md
      - docs/repository-genesis/repository-init-manifest.v1.yaml
      - docs/current-state/index/current-state-root.v1.yaml
      - docs/current-state/index/documentation-system-method.v1.yaml
      - docs/current-state/index/feature-manifest.v1.yaml
      - docs/current-state/index/runtime-topology.v1.yaml
      - docs/current-state/index/touchpoint-index.v1.yaml
      - docs/current-state/index/capability-tree.v1.yaml
      - docs/current-state/index/repo-state-classification.v1.yaml
      - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
      - .serena/onboarding.md
      - specs/README.md
      - scripts/validate_current_state_docs.py
    responsibilities:
      - Publish the repository bootstrap contract and constrained-index-first lookup docs
      - Keep spec-first entrypoints discoverable before product code exists
      - Provide a repo-local validation command for future onboarding and maintenance
  - runtime_id: docs-generation-pipeline
    kind: astro-docs-author-render-and-publish
    status: active
    files:
      - specs/author-docs-hub-foundation/design.md
      - specs/author-docs-hub-foundation/requirements.md
      - docs/adr/ADR-0001-derived-author-docs-hub.md
      - docs/adr/ADR-0002-astro-static-site-generator.md
      - docs/adr/ADR-0003-github-pages-publication-target.md
      - specs/author-docs-content-information-architecture/design.md
      - specs/author-docs-chapter-authoring/design.md
      - specs/author-docs-site-publication/design.md
      - specs/author-docs-upstream-ingest/design.md
      - specs/author-docs-diagnostics-parity/design.md
      - specs/author-docs-source-map-immutability/design.md
      - package.json
      - astro.config.mjs
      - src/content.config.ts
      - src/pages/index.astro
      - src/pages/chapters/[slug].astro
      - src/pages/sources.astro
      - src/content/chapters/00-start-here.md
      - .github/workflows/deploy.yml
      - docs/current-state/features/author-docs-hub-foundation/feature-detail.v1.yaml
    responsibilities:
      - Render authored beginner-friendly chapter Markdown as a static Astro site
      - Provide index, chapter detail, and sources pages for the published docs surface
      - Initialize Mermaid rendering for chapter diagrams on the client
      - Publish validated static artifacts to GitHub Pages under the irdtechbook account
      - Leave upstream ingest, parity validation, and source-map automation to future implementation lanes

canonical_paths:
  - path_id: repository-governance-bootstrap
    chain:
      - repo-governance-docs
    used_by:
      - repository-bootstrap
      - author-docs-hub-foundation
  - path_id: author-docs-publication
    chain:
      - docs-generation-pipeline
    used_by:
      - author-docs-hub-foundation
  - path_id: docs-generation-pipeline
    chain:
      - docs-generation-pipeline
    used_by:
      - author-docs-hub-foundation

variant_policy:
  canonical_current_docs: docs/current-state/index + docs/current-state/features
  retained_supporting_docs: []
  generated_views:
    - .serena/onboarding.md

confidence_and_gaps:
  confidence: high
  evidence:
    - AGENTS.md
    - docs/repository-genesis/repository-init-manifest.v1.yaml
    - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
    - docs/current-state/features/author-docs-hub-foundation/feature-detail.v1.yaml
    - specs/README.md
    - specs/author-docs-hub-foundation/design.md
    - scripts/validate_current_state_docs.py
  open_questions:
    - Which search/index integration and derivative artifact toolchain should sit behind the current Astro publication runtime?
    - Should the GitHub Pages publish workflow promote every main-branch build or release-tag builds only?
